<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Personal Expense Tracker</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-container">
    <div class="auth-card fade-in">
        <h2>Create Account</h2>
        <p>Start tracking your expenses like a pro.</p>
        <form id="signupForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="e.g. ashish_pk" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="e.g. user@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">Sign Up</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='/pages/login.html'">Login instead</button>
        </form>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:8082/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                if (response.ok) {
                    alert('Registration successful! Please login.');
                    window.location.href = '/pages/login.html';
                } else {
                    const data = await response.json();
                    alert('Registration failed: ' + (data.message || 'Error occurred'));
                }
            } catch (err) {
                console.error(err);
                alert('Connection error. Is the backend running?');
            }
        });
    </script>
</body>
</html>
